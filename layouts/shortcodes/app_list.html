<div class="app-list-container">
  {{ $apps := ($.Site.GetPage "section" "apps").Pages }}
  {{/* 依然保留 ByWeight 排序逻辑 */}}
  {{ range $apps.ByWeight }}
  <div class="app-item">
    <img src="{{ .Params.icon }}" class="app-icon">
    <div class="app-content-box">
      <div class="app-title-row">
        {{/* 这里去掉了编号显示，只保留标题 */}}
        <span class="app-title">{{ .Title }}</span>
        <a href="{{ .Params.download_url }}" target="_blank" class="download-btn">下载</a>
      </div>
      <span class="app-package">{{ .Params.package }}</span>
      <div class="app-desc">{{ .Params.description }}</div>
    </div>
  </div>
  {{ end }}
</div>

<style>
.app-list-container { margin-top: 10px; }
.app-item {
  display: flex;
  padding: 12px 0;
  border-bottom: 1px solid var(--border-color);
  gap: 12px;
  align-items: flex-start;
}
.app-icon {
  width: 41px; height: 41px;
  border-radius: 50% !important;
  object-fit: cover;
  flex-shrink: 0;
  margin-top: 2px;
}
.app-content-box {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.app-title-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1px;
}
.app-title { font-weight: 600; font-size: 1em; color: var(--text-main); line-height: 1.2; }
.app-package { font-size: 0.75em; color: var(--text-sub); line-height: 1.2; margin-bottom: 6px; }
.download-btn {
  background: var(--btn-bg);
  color: #fff !important;
  text-decoration: none;
  padding: 3px 12px;
  border-radius: 6px;
  font-size: 0.8em;
  font-weight: 600;
  flex-shrink: 0;
}
.app-desc { font-size: 0.92em; color: var(--text-desc); line-height: 1.5; }
@media (max-width: 600px) {
  .app-item { gap: 10px; }
}
</style>
