<style>
    /* 仅在此短代码容器内生效的局部变量 */
    .col-grid {
        --db-card-bg: rgba(255, 255, 255, 0.45);
        --db-text: #1f2937;
        --db-sub: #6b7280;
        --db-border: rgba(0, 0, 0, 0.06);
        
        display: grid;
        grid-template-columns: repeat(2, 1fr); /* 默认双列 */
        gap: 12px;
        margin: 20px 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* 暗黑模式适配 */
    @media (prefers-color-scheme: dark) {
        .col-grid {
            --db-card-bg: rgba(25, 25, 35, 0.5);
            --db-text: #eee;
            --db-sub: #9ca3af;
            --db-border: rgba(255, 255, 255, 0.08);
        }
    }

    .col-card {
        background: var(--db-card-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-radius: 18px;
        padding: 14px;
        border: 1px solid var(--db-border);
        display: flex;
        align-items: flex-start; /* 图标与标题对齐 */
        gap: 12px;
        text-decoration: none !important;
        transition: all .3s cubic-bezier(.23, 1, .32, 1);
    }

    .col-card:hover {
        transform: translateY(-3px);
        border-color: #3b82f6;
    }

    .col-icon {
        font-size: 24px;
        line-height: 1.2; /* 确保 Emoji/图标对齐标题第一行 */
        flex-shrink: 0;
    }

    .col-content {
        display: flex;
        flex-direction: column;
        min-width: 0; /* 防止长文本撑破布局 */
    }

    .col-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--db-text);
        margin: 0 0 4px 0;
        line-height: 1.3;
    }

    .col-desc {
        font-size: 12px;
        color: var(--db-sub);
        line-height: 1.4;
        word-break: break-word;
    }

    /* 移动端适配：单列显示 */
    @media (max-width: 480px) {
        .col-grid {
            grid-template-columns: 1fr;
        }
    }
</style>

<div class="col-grid">
  {{ range (where .Site.RegularPages "Section" "collection") }}
<a href="{{ .Params.link | default .RelPermalink }}" class="col-card" 
   {{ if (hasPrefix (.Params.link | default "") "http") }}target="_blank"{{ end }}>
    <div class="col-icon">{{ .Params.icon | default "🔖" }}</div>
    <div class="col-content">
      <h4 class="col-title">{{ .Title }}</h4>
      <div class="col-desc">{{ .Params.description }}</div>
    </div>
  </a>
  {{ end }}
</div>
