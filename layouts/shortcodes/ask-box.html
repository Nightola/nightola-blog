<style>
  :root {
    --db-btn-bg: rgba(31, 41, 55, .9);
    --db-btn-text: #fff;
    --text-sub: #666;
    --border-color: rgba(0, 0, 0, .08);
    --card-bg: rgba(128, 128, 128, .04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --db-btn-bg: rgba(243, 244, 246, .9);
      --db-btn-text: #111827;
      --text-sub: #bbb;
      --border-color: rgba(255, 255, 255, .12);
      --card-bg: rgba(255, 255, 255, .05);
    }
  }

  .ask-container { max-width: 850px; margin: 0 auto; color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .section-title { font-size: 1.1em; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
  .db-input { width: 100%; box-sizing: border-box; background: var(--card-bg); border: 1px solid var(--border-color); padding: 14px; border-radius: 14px; font-size: 14px; color: inherit; outline: 0; margin-bottom: 12px; }
  .qna-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .qna-check { font-size: 13px; display: flex; align-items: center; gap: 6px; opacity: .8; cursor: pointer; }
  .db-btn { width: 100%; background: var(--db-btn-bg); color: var(--db-btn-text); border: none; padding: 14px; border-radius: 14px; font-weight: 700; cursor: pointer; }
  .qna-item-bubble { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 18px; margin-bottom: 12px; cursor: pointer; }
  .qna-q-bubble { font-weight: 700; font-size: 14px; display: flex; justify-content: space-between; }
  .qna-q-bubble:after { content: '+'; opacity: .3; transition: .2s; }
  .active.qna-item-bubble .qna-q-bubble:after { transform: rotate(45deg); opacity: .7; }
  .qna-a-bubble { display: none; font-size: 13px; line-height: 1.7; color: var(--text-sub); padding-top: 12px; border-top: 1px dashed var(--border-color); margin-top: 12px; }
  .active.qna-item-bubble .qna-a-bubble { display: block; }
</style>

<div class="ask-container">
  <section class="card-item">
    <div class="section-title">提问箱</div>
    <textarea id="newQuestionInput" class="db-input" placeholder="输入问题..." rows="3"></textarea>
    <div class="qna-options">
      <label class="qna-check"><input type="checkbox" id="newPrivateReplyCheck"><span>不公开回复</span></label>
      <label class="qna-check"><input type="checkbox" id="newNotifyCheck"><span>回复通知</span></label>
    </div>
    <input type="email" id="newEmailInput" class="db-input" placeholder="填写邮箱接收通知" style="display:none">
    <button id="newSubmitQuestionBtn" class="db-btn">发送提问</button>

    <div style="margin:30px 0 15px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-weight:800;font-size:1em">🔍 往期存档</span>
      <span id="qnaCount" style="font-size:12px;opacity:.5">0/0</span>
    </div>
    <input type="text" id="qnaSearch" class="db-input" placeholder="搜索关键词..." oninput="renderQna()">
    <div id="qnaList">加载中...</div>
    <button id="loadMoreBtn" class="db-btn" style="display:none;margin-top:10px;background:0 0;border:1px solid var(--border-color);color:inherit" onclick="loadMore()">加载更多内容</button>
  </section>
</div>

<script>
(function() {
  const Q_CFG = { u: 'nightola', r: 'blog-moments', b: 'main' };
  const Q_URL = `https://ghproxy.net/https://raw.githubusercontent.com/${Q_CFG.u}/${Q_CFG.r}/${Q_CFG.b}/qna.json?t=${Date.now()}`;
  let allQ = [], filteredQ = [], currentSize = 5;

  async function initQna() {
    try {
      const r = await fetch(Q_URL);
      const d = await r.json();
      allQ = d.qna || [];
      renderQna();
    } catch (e) {
      document.getElementById('qnaList').innerHTML = '数据加载失败';
    }
  }

  window.renderQna = function(append = false) {
    const t = document.getElementById('qnaList');
    const n = document.getElementById('qnaSearch').value.toLowerCase();
    if (!append) { currentSize = 5; t.innerHTML = ""; }
    
    filteredQ = allQ.filter(x => x.q.toLowerCase().includes(n) || x.a.toLowerCase().includes(n));
    
    filteredQ.slice(append ? currentSize : 0, append ? currentSize + 5 : currentSize).forEach(item => {
      const div = document.createElement("div");
      div.className = "qna-item-bubble";
      div.onclick = function() { this.classList.toggle("active"); };
      div.innerHTML = `<div class="qna-q-bubble"><span>${item.q}</span></div><div class="qna-a-bubble"><div>${item.a}</div><div style="margin-top:10px;font-size:11px;opacity:.4;text-align:right">${item.time}</div></div>`;
      t.appendChild(div);
    });

    if(append) currentSize += 5;
    document.getElementById("qnaCount").textContent = `${Math.min(currentSize, filteredQ.length)}/${filteredQ.length}`;
    document.getElementById("loadMoreBtn").style.display = currentSize >= filteredQ.length ? "none" : "block";
  };

  window.loadMore = function() { renderQna(true); };

  document.getElementById('newNotifyCheck').addEventListener('change', function(e) {
    document.getElementById('newEmailInput').style.display = e.target.checked ? 'block' : 'none';
  });

  initQna();
})();
</script>
