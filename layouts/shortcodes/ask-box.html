<style>
  /* 仅针对提问箱容器的局部变量和样式 */
  .ask-wrapper {
    max-width: 850px;
    margin: 20px auto;
    color: var(--text-main, inherit);
    --ask-accent: #3b82f6;
    --ask-card-bg: rgba(128, 128, 128, 0.05);
    --ask-border: rgba(0, 0, 0, 0.08);
    --ask-btn-bg: #1f2937;
    --ask-btn-text: #ffffff;
  }

  @media (prefers-color-scheme: dark) {
    .ask-wrapper {
      --ask-card-bg: rgba(255, 255, 255, 0.05);
      --ask-border: rgba(255, 255, 255, 0.12);
      --ask-btn-bg: #f3f4f6;
      --ask-btn-text: #111827;
    }
  }

  .ask-wrapper .section-title { font-size: 1.1em; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
  .ask-wrapper .db-input { width: 100%; box-sizing: border-box; background: var(--ask-card-bg); border: 1px solid var(--ask-border); padding: 14px; border-radius: 14px; font-size: 14px; color: inherit; outline: 0; margin-bottom: 12px; transition: border 0.2s; }
  .ask-wrapper .db-input:focus { border-color: var(--ask-accent); }
  .ask-wrapper .qna-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .ask-wrapper .qna-check { font-size: 13px; display: flex; align-items: center; gap: 6px; opacity: 0.8; cursor: pointer; }
  .ask-wrapper .db-btn { width: 100%; background: var(--ask-btn-bg); color: var(--ask-btn-text); border: none; padding: 14px; border-radius: 14px; font-weight: 700; cursor: pointer; }

  /* 提问气泡样式 */
  .ask-wrapper .qna-item-bubble { background: var(--ask-card-bg); border: 1px solid var(--ask-border); border-radius: 16px; padding: 18px; margin-bottom: 12px; cursor: pointer; }
  .ask-wrapper .qna-q-bubble { font-weight: 700; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
  .ask-wrapper .qna-q-bubble:after { content: '+'; opacity: 0.3; transition: 0.2s; font-size: 18px; }
  .ask-wrapper .active.qna-item-bubble .qna-q-bubble:after { transform: rotate(45deg); opacity: 0.7; }
  .ask-wrapper .qna-a-bubble { display: none; font-size: 13px; line-height: 1.7; padding-top: 12px; border-top: 1px dashed var(--ask-border); margin-top: 12px; }
  .ask-wrapper .active.qna-item-bubble .qna-a-bubble { display: block; }

  /* 分页控制器样式 */
  .pagination-ctrl { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; padding-bottom: 20px; }
  .page-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--ask-border); background: var(--ask-card-bg); color: inherit; cursor: pointer; font-size: 13px; transition: all 0.2s; }
  .page-btn:hover:not(:disabled) { background: var(--ask-btn-bg); color: var(--ask-btn-text); }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .page-info { font-size: 13px; opacity: 0.6; font-family: monospace; }
</style>

<div class="ask-wrapper">
  <!-- 提问输入区 -->
  <section style="margin-bottom: 40px;">
    <div class="section-title">📮 提问箱</div>
    <textarea id="newQuestionInput" class="db-input" placeholder="输入你想问的内容..." rows="3"></textarea>
    <div class="qna-options">
      <label class="qna-check"><input type="checkbox" id="newPrivateReplyCheck"><span>不公开回复</span></label>
      <label class="qna-check"><input type="checkbox" id="newNotifyCheck"><span>回复通知</span></label>
    </div>
    <input type="email" id="newEmailInput" class="db-input" placeholder="填写邮箱接收通知" style="display:none">
    <button id="newSubmitQuestionBtn" class="db-btn">发送提问</button>
  </section>

  <!-- 历史存档区 -->
  <section>
    <div style="margin:30px 0 15px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-weight:800;font-size:1em">🔍 往期存档</span>
      {{ $answers := where .Site.RegularPages "Section" "ask" }}
      <span id="qnaCount" style="font-size:12px;opacity:.5">{{ len $answers }} 回复已送达</span>
    </div>

    <input type="text" id="qnaSearch" class="db-input" placeholder="搜索关键词..." oninput="handleSearch()">

    <!-- 列表容器 -->
    <div id="qnaList"></div>

    <!-- 分页控制器 -->
    <div class="pagination-ctrl" id="pageCtrl">
      <button class="page-btn" id="prevPage" onclick="changePage(-1)">上一页</button>
      <span class="page-info" id="pageDisplay">1 / 1</span>
      <button class="page-btn" id="nextPage" onclick="changePage(1)">下一页</button>
    </div>
  </section>
</div>

<script>
  // 1. Hugo 编译阶段：通过 htmlUnescape 处理乱码，通过 jsonify 封装字符串
  const allData = [
    {{ range $answers.ByDate.Reverse }}
    {
      title: {{ .Title | jsonify }},
      content: {{ .Content | htmlUnescape | jsonify }},
      date: {{ .Date.Format "2006-01-02 15:04" | jsonify }}
    },
    {{ end }}
  ];

  let filteredData = [...allData];
  let currentPage = 1;
  const pageSize = 10;

  // 渲染函数
  function renderList() {
    const listCont = document.getElementById('qnaList');
    if (!listCont) return;

    const start = (currentPage - 1) * pageSize;
    const end = start + pageSize;
    const pageData = filteredData.slice(start, end);

    if (pageData.length === 0) {
      listCont.innerHTML = '<div style="text-align:center;padding:20px;opacity:0.5;">没有找到相关提问</div>';
    } else {
      listCont.innerHTML = pageData.map(item => `
        <div class="qna-item-bubble" onclick="this.classList.toggle('active')">
          <div class="qna-q-bubble"><span>${item.title}</span></div>
          <div class="qna-a-bubble">
            <div class="markdown-content">${item.content}</div>
            <div style="margin-top:10px;font-size:11px;opacity:0.4;text-align:right">
              更新于 ${item.date}
            </div>
          </div>
        </div>
      `).join('');
    }

    updatePagination();
  }

  // 更新分页按钮状态
  function updatePagination() {
    const totalPages = Math.ceil(filteredData.length / pageSize) || 1;
    const displayEl = document.getElementById('pageDisplay');
    const ctrlEl = document.getElementById('pageCtrl');
    
    if (displayEl) displayEl.innerText = `${currentPage} / ${totalPages}`;
    if (ctrlEl) ctrlEl.style.display = filteredData.length <= pageSize ? 'none' : 'flex';
    
    document.getElementById('prevPage').disabled = currentPage === 1;
    document.getElementById('nextPage').disabled = currentPage === totalPages;
  }

  // 翻页
  function changePage(step) {
    currentPage += step;
    renderList();
    // 翻页后自动滚动到搜索框位置，体验更好
    document.getElementById('qnaSearch').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // 搜索逻辑
  function handleSearch() {
    const query = document.getElementById('qnaSearch').value.toLowerCase();
    filteredData = allData.filter(item => 
      item.title.toLowerCase().includes(query) || 
      item.content.toLowerCase().includes(query)
    );
    currentPage = 1; 
    renderList();
  }

  // 初始加载
  document.addEventListener('DOMContentLoaded', () => {
    renderList();
    
    // 通知切换逻辑
    document.getElementById('newNotifyCheck')?.addEventListener('change', function(e) {
      const emailInput = document.getElementById('newEmailInput');
      if (emailInput) emailInput.style.display = e.target.checked ? 'block' : 'none';
    });

    // 提交按钮演示
    document.getElementById('newSubmitQuestionBtn').onclick = function() {
      const input = document.getElementById('newQuestionInput').value;
      if (!input.trim()) return alert('请先输入问题内容');
      alert('发送成功！请关注博主后续的 MD 文件更新。');
    };
  });
</script>
