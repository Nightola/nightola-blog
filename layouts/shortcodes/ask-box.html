<style>
  :root {
    --db-btn-bg: rgba(31, 41, 55, .9);
    --db-btn-text: #fff;
    --text-sub: #666;
    --border-color: rgba(0, 0, 0, .08);
    --card-bg: rgba(128, 128, 128, .04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --db-btn-bg: rgba(243, 244, 246, .9);
      --db-btn-text: #111827;
      --text-sub: #bbb;
      --border-color: rgba(255, 255, 255, .12);
      --card-bg: rgba(255, 255, 255, .05);
    }
  }

  .ask-container { max-width: 850px; margin: 0 auto; padding-top: 10px; color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .section-title { font-size: 1.1em; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
  .db-input { width: 100%; box-sizing: border-box; background: var(--card-bg); border: 1px solid var(--border-color); padding: 14px; border-radius: 14px; font-size: 14px; color: inherit; outline: 0; margin-bottom: 12px; }
  .qna-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .qna-check { font-size: 13px; display: flex; align-items: center; gap: 6px; opacity: .8; cursor: pointer; }
  .db-btn { width: 100%; background: var(--db-btn-bg); color: var(--db-btn-text); border: none; padding: 14px; border-radius: 14px; font-weight: 700; cursor: pointer; }
  
  .qna-item-bubble { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 14px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; }
  .qna-q-bubble { font-weight: 700; font-size: 14px; display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .qna-q-bubble:after { content: '+'; opacity: .3; transition: .2s; flex-shrink: 0; }
  .active.qna-item-bubble .qna-q-bubble:after { transform: rotate(45deg); opacity: .7; }
  .qna-a-bubble { display: none; font-size: 13px; line-height: 1.7; color: var(--text-sub); padding-top: 10px; border-top: 1px dashed var(--border-color); margin-top: 12px; }
  .active.qna-item-bubble .qna-a-bubble { display: block; }
  .qna-time { margin-top: 10px; font-size: 11px; opacity: .4; text-align: right; }

  /* 分页专用样式 */
  .pagination-ctrl { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; }
  .page-btn { padding: 8px 16px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-sub); cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
  .page-btn:hover:not(:disabled) { background: var(--db-btn-bg); color: var(--db-btn-text); }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  #pageIndicator { font-size: 13px; font-weight: 700; color: var(--text-sub); }
</style>

<div class="ask-container">
  <section class="card-item">
    <div class="section-title">提问箱</div>
    <textarea id="newQuestionInput" class="db-input" placeholder="输入问题..." rows="3"></textarea>
    <div class="qna-options">
      <label class="qna-check"><input type="checkbox" id="newPrivateReplyCheck"><span>不公开回复</span></label>
      <label class="qna-check"><input type="checkbox" id="newNotifyCheck"><span>回复通知</span></label>
    </div>
    <input type="email" id="newEmailInput" class="db-input" placeholder="填写邮箱接收通知" style="display:none">
    <button id="newSubmitQuestionBtn" class="db-btn">发送提问</button>

    <div style="margin:30px 0 15px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-weight:800;font-size:1em">🔍 往期存档</span>
      <span id="qnaCount" style="font-size:12px;opacity:.5">0/0</span>
    </div>
    <input type="text" id="qnaSearch" class="db-input" placeholder="搜索关键词..." oninput="resetToFirstPage()">
    
    <div id="qnaList">
      {{ range (where .Site.RegularPages "Section" "ask").ByDate.Reverse }}
      <div class="qna-item-bubble" onclick="this.classList.toggle('active')">
        <div class="qna-q-bubble"><span>{{ .Title }}</span></div>
        <div class="qna-a-bubble">
          <div class="qna-content">{{ .Content }}</div>
          <div class="qna-time">{{ .Date.Format "2006-01-02 15:04" }}</div>
        </div>
      </div>
      {{ end }}
    </div>

    <!-- 分页控制栏 -->
    <div class="pagination-ctrl" id="paginationCtrl">
      <button class="page-btn" id="prevBtn" onclick="changePage(-1)">上一页</button>
      <span id="pageIndicator">1 / 1</span>
      <button class="page-btn" id="nextBtn" onclick="changePage(1)">下一页</button>
    </div>
  </section>
</div>

<script>
(function() {
  let items = [];
  let currentPage = 1;
  const pageSize = 10; // 每页显示10个

  function init() {
    items = Array.from(document.querySelectorAll('.qna-item-bubble'));
    updateView();
  }

  // 搜索时重置到第一页
  window.resetToFirstPage = function() {
    currentPage = 1;
    updateView();
  };

  window.changePage = function(step) {
    currentPage += step;
    updateView();
    // 切换页面后滚动到存档顶部（可选）
    document.getElementById('qnaSearch').scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  function updateView() {
    const keyword = document.getElementById('qnaSearch').value.toLowerCase();
    
    // 1. 过滤满足条件的项
    const matchedItems = items.filter(item => {
      return item.innerText.toLowerCase().includes(keyword);
    });

    // 2. 计算分页
    const totalMatch = matchedItems.length;
    const totalPages = Math.ceil(totalMatch / pageSize) || 1;
    if (currentPage > totalPages) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;

    const startIdx = (currentPage - 1) * pageSize;
    const endIdx = startIdx + pageSize;

    // 3. 控制显示
    items.forEach(item => item.style.display = 'none'); // 先全部隐藏
    
    matchedItems.forEach((item, index) => {
      if (index >= startIdx && index < endIdx) {
        item.style.display = 'block';
      }
    });

    // 4. 更新 UI 状态
    document.getElementById("qnaCount").textContent = `${totalMatch} 条结果`;
    document.getElementById("pageIndicator").textContent = `${currentPage} / ${totalPages}`;
    document.getElementById("prevBtn").disabled = (currentPage <= 1);
    document.getElementById("nextBtn").disabled = (currentPage >= totalPages);
    document.getElementById("paginationCtrl").style.display = (totalMatch <= pageSize && keyword === "") ? "none" : "flex";
  }

  document.getElementById('newNotifyCheck').addEventListener('change', function(e) {
    document.getElementById('newEmailInput').style.display = e.target.checked ? 'block' : 'none';
  });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
