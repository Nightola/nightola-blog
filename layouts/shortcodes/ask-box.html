<style>
  /* 仅针对提问箱容器的局部变量和样式 */
  .ask-wrapper {
    max-width: 850px;
    margin: 20px auto;
    color: var(--text-main, inherit);
    --ask-accent: #3b82f6;
    --ask-card-bg: rgba(128, 128, 128, 0.05);
    --ask-border: rgba(0, 0, 0, 0.08);
    --ask-btn-bg: #1f2937;
    --ask-btn-text: #ffffff;
  }

  @media (prefers-color-scheme: dark) {
    .ask-wrapper {
      --ask-card-bg: rgba(255, 255, 255, 0.05);
      --ask-border: rgba(255, 255, 255, 0.12);
      --ask-btn-bg: #f3f4f6;
      --ask-btn-text: #111827;
    }
  }

  .ask-wrapper .section-title {
    font-size: 1.1em;
    font-weight: 800;
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ask-wrapper .db-input {
    width: 100%;
    box-sizing: border-box;
    background: var(--ask-card-bg);
    border: 1px solid var(--ask-border);
    padding: 14px;
    border-radius: 14px;
    font-size: 14px;
    color: inherit;
    outline: 0;
    margin-bottom: 12px;
    transition: border 0.2s;
  }

  .ask-wrapper .db-input:focus { border-color: var(--ask-accent); }

  .ask-wrapper .qna-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }

  .ask-wrapper .qna-check {
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
    opacity: 0.8;
    cursor: pointer;
  }

  .ask-wrapper .db-btn {
    width: 100%;
    background: var(--ask-btn-bg);
    color: var(--ask-btn-text);
    border: none;
    padding: 14px;
    border-radius: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .ask-wrapper .db-btn:hover { opacity: 0.9; }

  .ask-wrapper .qna-item-bubble {
    background: var(--ask-card-bg);
    border: 1px solid var(--ask-border);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 12px;
    cursor: pointer;
  }

  .ask-wrapper .qna-q-bubble {
    font-weight: 700;
    font-size: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .ask-wrapper .qna-q-bubble:after {
    content: '+';
    opacity: 0.3;
    transition: 0.2s;
    font-size: 18px;
  }

  .ask-wrapper .active.qna-item-bubble .qna-q-bubble:after {
    transform: rotate(45deg);
    opacity: 0.7;
  }

  .ask-wrapper .qna-a-bubble {
    display: none;
    font-size: 13px;
    line-height: 1.7;
    padding-top: 12px;
    border-top: 1px dashed var(--ask-border);
    margin-top: 12px;
  }

  .ask-wrapper .active.qna-item-bubble .qna-a-bubble { display: block; }
  
  .ask-wrapper #qnaCount { font-family: monospace; }
</style>

<div class="ask-wrapper">
  <!-- 提问输入区 -->
  <section style="margin-bottom: 40px;">
    <div class="section-title">📮 提问箱</div>
    <textarea id="newQuestionInput" class="db-input" placeholder="输入你想问的内容..." rows="3"></textarea>
    
    <div class="qna-options">
      <label class="qna-check"><input type="checkbox" id="newPrivateReplyCheck"><span>不公开回复</span></label>
      <label class="qna-check"><input type="checkbox" id="newNotifyCheck"><span>回复通知</span></label>
    </div>
    
    <input type="email" id="newEmailInput" class="db-input" placeholder="填写邮箱接收通知" style="display:none">
    <button id="newSubmitQuestionBtn" class="db-btn">发送提问</button>
  </section>

  <!-- 历史存档区 -->
  <section>
    <div style="margin:30px 0 15px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-weight:800;font-size:1em">🔍 往期存档</span>
      {{ $answers := where .Site.RegularPages "Section" "ask" }}
      <span id="qnaCount" style="font-size:12px;opacity:.5">{{ len $answers }} 回复已送达</span>
    </div>

    <input type="text" id="qnaSearch" class="db-input" placeholder="搜索关键词..." oninput="filterQna()">

    <div id="qnaList">
      {{ range $answers.ByDate.Reverse }}
      <div class="qna-item-bubble" onclick="this.classList.toggle('active')">
        <div class="qna-q-bubble">
          <span>{{ .Title }}</span>
        </div>
        <div class="qna-a-bubble">
          <div class="markdown-content">{{ .Content }}</div>
          <div style="margin-top:10px;font-size:11px;opacity:0.4;text-align:right">
            Replied on {{ .Date.Format "2006-01-02" }}
          </div>
        </div>
      </div>
      {{ end }}
    </div>
  </section>
</div>

<script>
  // 搜索过滤逻辑
  function filterQna() {
    const query = document.getElementById('qnaSearch').value.toLowerCase();
    const items = document.querySelectorAll('.qna-item-bubble');
    items.forEach(item => {
      const isMatch = item.innerText.toLowerCase().includes(query);
      item.style.display = isMatch ? "block" : "none";
    });
  }

  // 邮箱通知显示切换
  document.getElementById('newNotifyCheck')?.addEventListener('change', function(e) {
    document.getElementById('newEmailInput').style.display = e.target.checked ? 'block' : 'none';
  });

  // 提问提交逻辑 (你可以在此处对接你的 API)
  document.getElementById('newSubmitQuestionBtn').onclick = function() {
    const question = document.getElementById('newQuestionInput').value;
    if(!question) return alert('还没输入问题哦');
    alert('提交成功！请等待博主更新 MD 文件后即可在此显示。');
  };
</script>
