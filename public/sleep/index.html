      <style>
        :root {
            --db-bg: transparent;
            --db-card-bg: rgba(255, 255, 255, 0.45);
            --db-text: #1f2937;
            --db-sub: #6b7280;
            --db-accent: #3b82f6;
            --db-green: #10b981;
            --db-border: rgba(0, 0, 0, 0.06);
            --db-btn-bg: rgba(31, 41, 55, 0.9);
            --db-btn-text: #ffffff;
            --db-poke-theme: var(--db-btn-bg);
            --db-log-bg: #0d1117;
            --db-log-green: #4ade80;
            --db-log-dim: #305c42
        }

        @media(prefers-color-scheme:dark) {
            :root {
                --db-card-bg: rgba(25, 25, 35, 0.5);
                --db-text: #eee;
                --db-sub: #9ca3af;
                --db-border: rgba(255, 255, 255, 0.08);
                --db-btn-bg: rgba(243, 244, 246, 0.9);
                --db-btn-text: #111827;
                --db-poke-theme: var(--db-btn-bg)
            }
        }

        .db-container {
            width: 100%;
            margin: 20px 0;
            padding: 0;
            background: var(--db-bg);
            position: relative;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif
        }

        .db-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 0 8px
        }

        .db-title {
            margin: 0;
            font-size: 1.1rem;
            color: var(--db-text);
            font-weight: 800
        }

        .db-live-tag {
            font-size: 10px;
            background: #ef4444;
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            animation: db-blink 2s infinite;
            font-weight: bold
        }

        .db-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px
        }

        .full-row {
            grid-column: span 2
        }

        .db-card {
            background: var(--db-card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 18px;
            padding: 14px;
            border: 1px solid var(--db-border);
            position: relative;
            display: flex;
            flex-direction: column;
            transition: all .3s cubic-bezier(.23, 1, .32, 1)
        }

        .db-label {
            font-size: 13px;
            color: var(--db-sub);
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 1px
        }

        .elona-log {
            background: var(--db-log-bg);
            border-radius: 10px;
            padding: 10px;
            font-family: "JetBrains Mono", "Consolas", monospace;
            font-size: 10px;
            line-height: 1.4;
            color: var(--db-log-green);
            border: 1px solid rgba(74, 222, 128, 0.15);
            max-height: 90px;
            overflow-y: auto;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.3)
        }

        .log-entry {
            margin-bottom: 3px;
            display: flex;
            gap: 6px
        }

        .log-time {
            color: var(--db-log-dim);
            flex-shrink: 0
        }

        .log-msg-normal,
        .log-msg-event,
        .log-msg-danger,
        .log-msg-gain {
            color: inherit;
            font-weight: normal;
            text-decoration: none;
            font-style: normal
        }

        .db-meta {
            font-size: 11px;
            color: var(--db-sub)
        }

        .status-wrap {
            display: flex;
            position: relative;
            align-items: center;
            flex: 1
        }

        .status-val {
            margin: 0;
            font-size: 1.4rem;
            color: var(--db-text);
            font-weight: 700
        }

        .status-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px
        }

        .poke-group {
            display: flex;
            align-items: center;
            gap: 12px
        }

        .poke-count {
            font-size: 11px;
            font-weight: 900;
            color: var(--db-text);
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.05)
        }

        .db-clock {
            font-family: "JetBrains Mono", monospace;
            font-size: 2.8rem;
            font-weight: 600;
            color: var(--db-text);
            line-height: 1
        }

        .db-energy {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px
        }

        .energy-bar {
            flex: 1;
            height: 5px;
            background: rgba(0, 0, 0, .08);
            border-radius: 10px;
            overflow: hidden
        }

        .energy-in {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #2dd4bf);
            transition: all .8s;
            display: block
        }

        .energy-full .energy-in {
            background: linear-gradient(90deg, #f59e0b, #fbbf24, #f59e0b);
            background-size: 200% 100%;
            animation: stardust 2s linear infinite;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.5)
        }

        @keyframes stardust {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: 0 0
            }
        }

        .app-content {
            display: flex;
            align-items: center;
            gap: 12px
        }

        .app-icon {
            width: 16px;
            height: 16px;
            color: var(--db-sub)
        }

        .app-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--db-text);
            word-break: break-word
        }

        .dot-indicator {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #d1d5db
        }

        .dot-indicator.active {
            background: var(--db-green);
            box-shadow: 0 0 10px var(--db-green)
        }

        .music-body {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%
        }

        .music-img {
            width: 52px;
            height: 52px;
            border-radius: 10px;
            object-fit: cover;
            background: rgba(0, 0, 0, .05);
            flex-shrink: 0
        }

        .music-content {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 5px
        }

        .music-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--db-text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            line-height: 1.3
        }

        .music-sub {
            font-size: 12px;
            color: var(--db-sub);
            line-height: 1.3
        }

        .music-bars {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 14px;
            margin-left: 8px;
            opacity: 0;
            flex-shrink: 0
        }

        .music-bar {
            width: 3px;
            background: #3b82f6;
            border-radius: 1px
        }

        .music-playing .music-bars {
            opacity: 1
        }

        .music-playing .music-bar {
            animation: music-bounce 0.8s ease-in-out infinite alternate
        }

        .music-bar:nth-child(2) {
            animation-delay: 0.2s
        }

        .music-bar:nth-child(3) {
            animation-delay: 0.4s
        }

        @keyframes music-bounce {
            from {
                height: 4px
            }

            to {
                height: 14px
            }
        }

        .music-playing {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.25);
            animation: music-breath 3s ease-in-out infinite
        }

        @keyframes music-breath {

            0%,
            100% {
                box-shadow: 0 0 5px rgba(59, 130, 246, 0.1)
            }

            50% {
                box-shadow: 0 0 18px rgba(59, 130, 246, 0.4)
            }
        }

        .msg-header {
            margin-bottom: 10px
        }

        .msg-form {
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .msg-input {
            width: 100%;
            box-sizing: border-box;
            background: rgba(0, 0, 0, .02);
            border: 1px solid var(--db-border);
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            color: var(--db-text);
            outline: 0
        }

        .msg-area {
            min-height: 50px;
            resize: none
        }

        .msg-ctrl {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px
        }

        .opt-btn {
            background: 0;
            border: 0;
            color: var(--db-sub);
            font-size: 11px;
            cursor: pointer;
            font-weight: 700
        }

        .msg-btn,
        .poke-btn {
            background: var(--db-btn-bg);
            color: var(--db-btn-text);
            border: 0;
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 900;
            cursor: pointer
        }

        .poke-btn {
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 10px
        }

        .db-bubble {
            position: absolute;
            bottom: 100%;
            left: 0;
            background: var(--db-poke-theme);
            color: var(--db-btn-text) !important;
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 800;
            opacity: 0;
            transition: .3s;
            pointer-events: none;
            z-index: 100;
            margin-bottom: 10px
        }

        .db-bubble.show {
            opacity: 1;
            transform: translateY(-5px)
        }

        .db-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            padding: 0 8px
        }

        .footer-link {
            font-size: 12px;
            color: var(--db-sub);
            text-decoration: none;
            font-weight: 700
        }

        .footer-note {
            font-size: 10px;
            color: var(--db-sub);
            opacity: 0.5
        }

        .plan-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .plan-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--db-text);
            font-weight: 600
        }

        .plan-icon {
            width: 14px;
            height: 14px;
            color: var(--db-sub)
        }

        .plan-footer {
            margin-top: 12px;
            display: flex;
            justify-content: flex-end
        }

        @keyframes db-blink {
            50% {
                opacity: .4
            }
        }

        @keyframes star-rot {
            from {
                transform: rotate(0)
            }

            to {
                transform: rotate(360deg)
            }
        }

        @media(max-width:480px) {
            .db-grid {
                grid-template-columns: 1fr
            }

            .full-row {
                grid-column: span 1
            }
        }
    </style>
</head>

                            placeholder="如何称呼你或联系你？" class="msg-input"></div>
                    <div class="msg-ctrl"><button type="button" class="opt-btn" onclick="toggleReply(this)">＋
                            留下回信方式</button><button type="submit" class="msg-btn" id="submit-btn">发射信号</button></div>
                </form>

    <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>const MY_PLANS = { updateDate: '2025/12/25', items: ['整理桌面APP', '博客优化和数据计入', '用AI帮我量化记录情绪'] }; const CONFIG = { supabaseUrl: 'https://pbjlcleefihfpeqkinyc.supabase.co', supabaseKey: 'sb_publishable_XzmbmXWoZARaKViOoKB95Q_Ut4N7oPr', tableName: 'sleep_tracker', logTable: 'survival_logs', recordId: 1, lastfmUser: 'nightola', lastfmKey: '875851062e9caa138b84dcc5554d026e' }; document.addEventListener('DOMContentLoaded', () => { const d = { logBox: document.getElementById('elona-log-box'), statusText: document.getElementById('status-text'), statusTime: document.getElementById('status-time'), clock: document.getElementById('local-clock'), energyVal: document.getElementById('energy-value'), energyFill: document.getElementById('energy-fill'), energyBox: document.getElementById('energy-container'), musicCard: document.getElementById('music-card'), musicTrack: document.getElementById('music-track'), musicArtist: document.getElementById('music-artist'), musicArt: document.getElementById('music-art'), pcName: document.getElementById('desktop-app-name'), pcDot: document.getElementById('desktop-dot'), mbName: document.getElementById('mobile-app-name'), mbDot: document.getElementById('mobile-dot'), bubble: document.getElementById('poke-bubble'), form: document.getElementById('contact-form'), btn: document.getElementById('submit-btn'), pokeCount: document.getElementById('poke-count'), planList: document.getElementById('plan-list-container'), planTime: document.getElementById('plan-update-time'), replyWrapper: document.getElementById('reply-wrapper') }; const q = ["别戳啦，在努力了！", "✨ 接收到信号...", "(。-ω-) 唔姆...", "亚离解状态良好", "捕捉到一颗流星！", "观测站运转中..."]; const tick = () => { const n = new Date(); d.clock.textContent = n.toLocaleTimeString('zh-CN', { hour12: false, hour: '2-digit', minute: '2-digit' }); const eg = Math.floor(((n.getHours() * 3600 + n.getMinutes() * 60) / 86400) * 100); if (eg >= 100) { d.energyVal.textContent = 'MAX'; d.energyFill.style.width = '100%'; d.energyBox.classList.add('energy-full') } else { d.energyVal.textContent = eg + '%'; d.energyFill.style.width = eg + '%'; d.energyBox.classList.remove('energy-full') } }; tick(); setInterval(tick, 1000); d.planTime.textContent = '更新于 ' + MY_PLANS.updateDate; d.planList.innerHTML = MY_PLANS.items.map(it => `<li class="plan-item"><svg class="plan-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle></svg> ${it}</li>`).join(''); d.pokeCount.textContent = (localStorage.getItem('db_pokes') || "0") + " 共鸣"; let sb; const initSupabase = async () => { if (typeof supabase === 'undefined') { setTimeout(initSupabase, 100); return } if (!sb) sb = supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey); const [statusRes, logsRes] = await Promise.all([sb.from(CONFIG.tableName).select('*').eq('id', CONFIG.recordId).single(), sb.from(CONFIG.logTable).select('*').order('created_at', { ascending: false }).limit(10)]); if (statusRes.data) renderData(statusRes.data); if (logsRes.data) d.logBox.innerHTML = logsRes.data.map(l => createLogHtml(l)).join(''); setupRealtime() }; const createLogHtml = (l) => { const t = new Date(l.created_at).toLocaleTimeString('zh-CN', { hour12: false, hour: '2-digit', minute: '2-digit' }); return `<div class="log-entry"><span class="log-time">[${t}]</span><span class="log-msg-${l.type || 'normal'}">${l.msg}</span></div>` }; const renderData = (row) => { if (!row) return; d.statusText.textContent = row.status === 'awake' ? '清醒中 ✨' : '睡眠中 💤'; const ld = new Date(row.updated_at); d.statusTime.textContent = '更新于 ' + ld.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }); const updateApp = (val, el, dot, defaultText) => { const name = val || defaultText; el.textContent = name; if (name !== "休息中" && name !== "离线" && name !== "待机中" && !name.includes("Locked")) dot.classList.add('active'); else dot.classList.remove('active') }; updateApp(row.pc_app, d.pcName, d.pcDot, "离线"); updateApp(row.mobile_app, d.mbName, d.mbDot, "休息中") }; const setupRealtime = () => { sb.channel('db_realtime').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: CONFIG.tableName, filter: `id=eq.${CONFIG.recordId}` }, p => renderData(p.new)).subscribe(); sb.channel('survival_realtime').on('postgres_changes', { event: 'INSERT', schema: 'public', table: CONFIG.logTable }, p => { d.logBox.insertAdjacentHTML('afterbegin', createLogHtml(p.new)); if (d.logBox.children.length > 15) d.logBox.removeChild(d.logBox.lastChild) }).subscribe() }; async function updateMusic() { try { const r = await fetch(`https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${CONFIG.lastfmUser}&api_key=${CONFIG.lastfmKey}&format=json&limit=1`); const dat = await r.json(); const t = dat.recenttracks.track[0]; if (t && t['@attr'] && t['@attr'].nowplaying === 'true') { d.musicTrack.textContent = t.name; d.musicArtist.textContent = t.artist['#text']; d.musicArt.src = t.image[2]?.['#text']; d.musicCard.classList.add('music-playing') } else { d.musicCard.classList.remove('music-playing'); d.musicTrack.textContent = "目前没有在听歌..."; d.musicArtist.textContent = "静音中" } } catch (e) { } }; window.toggleReply = (b) => { const isH = d.replyWrapper.style.display === 'none'; d.replyWrapper.style.display = isH ? 'block' : 'none'; b.textContent = isH ? '－ 取消回信方式' : '＋ 留下回信方式' }; window.handlePoke = (e) => { let p = parseInt(localStorage.getItem('db_pokes') || "0") + 1; localStorage.setItem('db_pokes', p); d.pokeCount.textContent = p + " 共鸣"; d.bubble.textContent = q[Math.floor(Math.random() * q.length)]; d.bubble.classList.add('show'); setTimeout(() => d.bubble.classList.remove('show'), 2000) }; d.form.onsubmit = (e) => { e.preventDefault(); d.btn.disabled = !0; d.btn.textContent = '发送中...'; setTimeout(() => { d.btn.textContent = '已发送！'; setTimeout(() => { d.btn.disabled = !1; d.btn.textContent = '发射信号'; d.form.reset(); d.replyWrapper.style.display = 'none' }, 2000) }, 1000) }; initSupabase(); setTimeout(updateMusic, 500); setInterval(updateMusic, 30000) })</script>
