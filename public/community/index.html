<script>
function switchTab(t){
    const e=document.getElementById("form-apply"),
          n=document.getElementById("form-message"),
          s=document.querySelectorAll(".tab-btn");
    s.forEach(btn=>btn.classList.remove("active"));
    if(t==='apply'){
        e.classList.toggle("active");
        n.classList.remove("active");
        if(e.classList.contains("active")) s[0].classList.add("active");
    }else{
        n.classList.toggle("active");
        e.classList.remove("active");
        if(n.classList.contains("active")) s[1].classList.add("active");
    }
}
</script>
