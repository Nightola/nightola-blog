<div id="m-archive-container">
  
  <div class="archive-controls">
    <input type="text" id="m-search" placeholder="搜索动态内容..." autocomplete="off">
    <div id="year-filters">
      <button class="year-btn active" data-year="all">全部</button>
      
      
      
      
        
      
      
        <button class="year-btn" data-year="2024">2024</button>
      
    </div>
  </div>

  
  <div id="m-moments-list">
    
    <div class="m-i archive-item" data-year="2024">
      <div class="m-lt">
        <img src="https://nightola.pages.dev/file/blog_avatar/1766510318687_avatar.webp" class="m-a">
      </div>
      <div class="m-rt">
        <div class="m-id">亚离解星</div>
        <div class="m-t"><p>这是一条测试动态3</p>
</div>
        
        <div class="m-f">2024年03月01日</div>
      </div>
    </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const searchInput = document.getElementById('m-search');
  const yearBtns = document.querySelectorAll('.year-btn');
  const items = document.querySelectorAll('.archive-item');

  function filter() {
    const searchText = searchInput.value.toLowerCase();
    const activeYear = document.querySelector('.year-btn.active').dataset.year;

    items.forEach(item => {
      const text = item.querySelector('.m-t').innerText.toLowerCase();
      const year = item.dataset.year;
      const matchesSearch = text.includes(searchText);
      const matchesYear = (activeYear === 'all' || year === activeYear);

      if (matchesSearch && matchesYear) {
        item.style.display = 'grid';
      } else {
        item.style.display = 'none';
      }
    });
  }

  searchInput.addEventListener('input', filter);
  yearBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      yearBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter();
    });
  });
});
</script>
